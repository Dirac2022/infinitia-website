<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Infinitia — Software para cada plataforma</title>
  <link rel="stylesheet" href="styles/site.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="src/content.js"></script>
  <script src="src/icons.js"></script>
  <script type="text/babel" src="src/sections-a.jsx"></script>
  <script type="text/babel" src="src/sections-b.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem("infinitia-lang") || "es");
      useEffect(() => {
        localStorage.setItem("infinitia-lang", lang);
        document.documentElement.lang = lang;
      }, [lang]);

      const t = window.CONTENT[lang];

      // reveal-on-scroll
      useReveal();
      useEffect(() => {
        // re-run on lang change to catch newly rendered nodes
        const id = setTimeout(() => {
          document.querySelectorAll(".reveal:not(.in)").forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.top < window.innerHeight * 0.9) el.classList.add("in");
          });
        }, 50);
        return () => clearTimeout(id);
      }, [lang]);

      return (
        <>
          <Nav lang={lang} setLang={setLang} t={t} />
          <main>
            <Hero t={t} />
            <Services t={t} />
            <Process t={t} />
            <Stats t={t} />
            <Team t={t} />
            <Clients t={t} />
            <FAQ t={t} />
            <Contact t={t} />
          </main>
          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
