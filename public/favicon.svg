    <radialGradient id="smokeBlueF" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#3b82ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82ff" stop-opacity="0"/>
