<body>
  <div id="root"></div>

  <script src="src/content.js"></script>
  <script src="src/icons.js"></script>
  <script type="text/babel" src="src/sections-a.jsx"></script>
  <script type="text/babel" src="src/sections-b.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState(() => {
        try { return localStorage.getItem("infinitia-lang") || "es"; }
        catch { return "es"; }
      });

      useEffect(() => {
        try { localStorage.setItem("infinitia-lang", lang); } catch {}
        document.documentElement.lang = lang;
      }, [lang]);

      const t = window.CONTENT[lang];

      // reveal-on-scroll
      useReveal();
      useEffect(() => {
        // re-run on lang change to catch newly rendered nodes
        const id = setTimeout(() => {
          document.querySelectorAll(".reveal:not(.in)").forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.top < window.innerHeight * 0.9) el.classList.add("in");
          });
        }, 50);
        return () => clearTimeout(id);
      }, [lang]);

      return (
        <>
          <Nav lang={lang} setLang={setLang} t={t} />
          <main>
            <Hero t={t} />
            <Services t={t} />
            <Process t={t} />
            <Stats t={t} />
            <Team t={t} />
            <Clients t={t} />
            <FAQ t={t} />
            <Contact t={t} />
          </main>
          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
